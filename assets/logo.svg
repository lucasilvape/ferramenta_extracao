<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 110" width="40" height="40">
  <!-- Logo Kovr - k entre parênteses verdes -->
  <rect width="100%" height="100%" fill="none"/>

  <!-- Parêntese esquerdo (arco) -->
  <path d="M35 20 A30 30 0 0 0 35 90" stroke="#00FF00" stroke-width="12" stroke-linecap="round" fill="none"/>

  <!-- Parêntese direito (arco) -->
  <path d="M75 20 A30 30 0 0 1 75 90" stroke="#00FF00" stroke-width="12" stroke-linecap="round" fill="none"/>

  <!-- Letra 'k' central -->
  <text x="55" y="62" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="48" text-anchor="middle" fill="#FFFFFF" dominant-baseline="middle">k</text>
</svg>